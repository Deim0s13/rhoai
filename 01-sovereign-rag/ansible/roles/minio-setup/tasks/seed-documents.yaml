# seed-documents.yaml
# Uploads regulatory PDFs from the local data/raw/ directory to MinIO.
# PDFs are not committed to git — they must be present locally before running.
# See data/README.md for download instructions.

- name: Check local documents exist
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../data/raw"
    patterns: "*.pdf"
  register: local_pdfs
  failed_when: local_pdfs.matched == 0

- name: Upload regulatory documents to MinIO
  ansible.builtin.command: >
    mc cp
    {{ item.path }}
    sovereign-rag/documents/
  loop: "{{ local_pdfs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
