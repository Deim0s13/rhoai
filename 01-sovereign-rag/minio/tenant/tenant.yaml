# tenant.yaml
# MinIO deployed directly as a Deployment — no operator dependency.
# Suitable for demo/PoC scale. Single instance, no erasure coding.
#
# NOTE: originally designed to use the open-source MinIO Operator.
# Switched to direct deployment after discovering the certified catalog
# only offers MinIO AIStor, which uses an incompatible CRD (ObjectStore)
# and a different operational model. Direct deployment avoids that
# dependency entirely and is simpler for a disposable demo environment.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: sovereign-rag
  labels:
    app: minio
    app.kubernetes.io/part-of: rhoai-presales-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          envFrom:
            - secretRef:
                name: minio-tenant-credentials
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-tenant-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-tenant-credentials
                  key: secretkey
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data-pvc
  namespace: sovereign-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sovereign-rag
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  namespace: sovereign-rag
spec:
  to:
    kind: Service
    name: minio
  port:
    targetPort: console
  tls:
    termination: edge
