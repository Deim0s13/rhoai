# tenant-secret.yaml
# Credentials for the MinIO tenant.
# DO NOT commit real values. Apply with envsubst:
#   MINIO_ACCESS_KEY=xxx MINIO_SECRET_KEY=yyy envsubst \
#     < minio/tenant/tenant-secret.yaml | oc apply -f -
#
# In a production GitOps setup, seal this with Sealed Secrets or
# External Secrets Operator pulling from AWS SSM.
apiVersion: v1
kind: Secret
metadata:
  name: minio-tenant-credentials
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
type: Opaque
stringData:
  accesskey: "${MINIO_ACCESS_KEY}"
  secretkey: "${MINIO_SECRET_KEY}"
