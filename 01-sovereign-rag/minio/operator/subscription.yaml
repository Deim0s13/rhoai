# subscription.yaml
# OLM Subscription for the MinIO Operator.
# Uses the Red Hat certified operator catalog — preferred over community-operators
# for regulated environment deployments. Certified operators carry Red Hat's
# support assurance and are validated against the OpenShift platform version.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: minio-operator
  namespace: minio-operator
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
spec:
  channel: stable
  name: minio-object-store-operator
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: minio-operator-group
  namespace: minio-operator
spec: {} # empty spec = AllNamespaces mode
