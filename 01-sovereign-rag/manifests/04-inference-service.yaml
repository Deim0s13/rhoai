# 04-inference-service.yaml
# Deploys the model using the vLLM runtime defined above.
# Model: granite-3.1-8b-instruct — Red Hat's supported open model,
# appropriate for a regulated-environment demo (no external API calls).
#
# MODEL STORAGE NOTE:
# The storageUri below assumes the model is available in an S3-compatible
# bucket you control. See data/README.md for how to pre-stage the model.
# Alternatively, use a PVC with the model pre-downloaded.
#
# GPU NOTE:
# Configured for NVIDIA L4 (24GB VRAM).
# granite-3.1-8b in bf16 requires ~16GB VRAM, fitting comfortably within the L4.
# Verify the exact node label before deploying:
#   oc get nodes -o json | jq '.items[].metadata.labels' | grep nvidia
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-instruct
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    serving.knative.openshift.io/enablePassthrough: "true"
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
spec:
  predictor:
    model:
      modelFormat:
        name: pytorch
      runtime: vllm-runtime
      storageUri: "s3://YOUR_BUCKET/granite-3.1-8b-instruct"
      # --- swap to PVC if no S3 available ---
      # volumes:
      #   - name: model-volume
      #     persistentVolumeClaim:
      #       claimName: granite-model-pvc
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L4 # verify exact label on your cluster
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    containers:
      - name: kserve-container
        args:
          - "--model=/mnt/models"
          - "--port=8080"
          - "--dtype=bfloat16"
          - "--max-model-len=8192"
          - "--gpu-memory-utilization=0.85"
        resources:
          requests:
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"
