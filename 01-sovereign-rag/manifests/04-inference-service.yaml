# 04-inference-service.yaml
# Deploys the model using the vLLM runtime defined above.
# Model: granite-3.1-8b-instruct
#
# UPDATED: storageUri points at self-hosted MinIO (bucket: models).
# Credentials and endpoint are resolved via the ServiceAccount, which
# references the MinIO data connection secret (06-data-connection.yaml).
#
# FIXED: removed args from model:. KServe merges ServingRuntime
# container args with InferenceService model args, and having both
# define overlapping flags (--port, --dtype, --max-model-len, plus a
# duplicate --model) produced a malformed, self-contradicting argument
# list that the vllm CLI rejected. All serving arguments now live in
# the ServingRuntime (03-model-serving-runtime.yaml) as the single
# source of truth; this InferenceService only specifies what model
# to load and where its resources/scheduling constraints are.
#
# GPU NOTE:
# Configured for NVIDIA L4 (24GB VRAM) — confirmed on this cluster via
# node label nvidia.com/gpu.product=NVIDIA-L4.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-instruct
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    serving.kserve.io/deploymentMode: "RawDeployment"
spec:
  predictor:
    serviceAccountName: minio-sa
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L4
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: pytorch
      runtime: vllm-runtime
      storageUri: "s3://models/granite-3.1-8b-instruct"
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
