# 04-inference-service.yaml
# Deploys the model using the vLLM runtime defined above.
# Model: granite-3.1-8b-instruct
#
# UPDATED: storageUri now points at self-hosted MinIO (bucket: models)
# rather than native AWS S3. Credentials and endpoint are resolved via
# the ServiceAccount below, which references the MinIO data connection
# secret (06-data-connection.yaml).
#
# GPU NOTE:
# Configured for NVIDIA L4 (24GB VRAM) — confirmed on this cluster via
# node label nvidia.com/gpu.product=NVIDIA-L4.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-instruct
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    serving.knative.openshift.io/enablePassthrough: "true"
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
spec:
  predictor:
    serviceAccountName: minio-sa # references the SA bound to our data connection secret
    model:
      modelFormat:
        name: pytorch
      runtime: vllm-runtime
      storageUri: "s3://models/granite-3.1-8b-instruct"
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L4
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    containers:
      - name: kserve-container
        args:
          - "--model=/mnt/models"
          - "--port=8080"
          - "--dtype=bfloat16"
          - "--max-model-len=8192"
          - "--gpu-memory-utilization=0.85"
        resources:
          requests:
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"
