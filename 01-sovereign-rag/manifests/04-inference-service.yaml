# 04-inference-service.yaml
# Deploys the model using the vLLM runtime defined above.
# Model: granite-3.1-8b-instruct
#
# UPDATED: storageUri now points at self-hosted MinIO (bucket: models)
# rather than native AWS S3. Credentials and endpoint are resolved via
# the ServiceAccount below, which references the MinIO data connection
# secret (06-data-connection.yaml).
#
# FIXED: removed the sibling `containers:` block under predictor.
# The KServe validating webhook requires exactly one predictor type
# (Model, PyTorch, SKLearn, PodSpec, etc.) — having both `model:` and
# `containers:` set under predictor was read as two competing predictor
# specs and rejected. args/resources now live directly under `model:`.
#
# FIXED: added the RawDeployment annotation. Default Serverless mode
# requires the namespace to be enrolled in the cluster's Service Mesh
# member roll — this cluster has Service Mesh integration enabled for
# Serverless InferenceServices, and sovereign-rag was never added to
# the mesh. RawDeployment mode skips Knative/Istio entirely and deploys
# a standard Kubernetes Deployment instead — simpler, no mesh dependency,
# and avoids taking on Service Mesh enrollment just for this use case.
#
# GPU NOTE:
# Configured for NVIDIA L4 (24GB VRAM) — confirmed on this cluster via
# node label nvidia.com/gpu.product=NVIDIA-L4.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-instruct
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    serving.kserve.io/deploymentMode: "RawDeployment"
spec:
  predictor:
    serviceAccountName: minio-sa
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L4
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: pytorch
      runtime: vllm-runtime
      storageUri: "s3://models/granite-3.1-8b-instruct"
      args:
        - "--model=/mnt/models"
        - "--port=8080"
        - "--dtype=bfloat16"
        - "--max-model-len=8192"
        - "--gpu-memory-utilization=0.85"
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
