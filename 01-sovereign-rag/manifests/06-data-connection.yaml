# 06-data-connection.yaml
# Secret that RHOAI uses to connect to your S3-compatible object store.
# Used both for model storage (InferenceService) and optionally for
# storing ingested document chunks.
#
# DO NOT commit real credentials. Use a .env file locally and substitute
# with `envsubst` or seal with Sealed Secrets / Vault before committing.
#
# Apply with:
#   AWS_ACCESS_KEY_ID=xxx AWS_SECRET_ACCESS_KEY=yyy envsubst \
#     < manifests/06-data-connection.yaml | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: s3-data-connection
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: "S3 Data Connection"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
  AWS_S3_BUCKET: "${AWS_S3_BUCKET}"
  AWS_S3_ENDPOINT: "${AWS_S3_ENDPOINT}"
