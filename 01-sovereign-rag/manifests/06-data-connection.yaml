# 06-data-connection.yaml
# Secret that KServe uses to connect to the model storage backend.
#
# UPDATED: originally written for native AWS S3. This environment uses
# self-hosted MinIO (deployed via manifests/02-milvus.yaml's sibling
# pattern — see minio/tenant/tenant.yaml), so the annotations below
# tell KServe's S3 storage initializer to use a custom endpoint rather
# than assuming AWS.
#
# DO NOT commit real credentials. Apply with envsubst:
#   MINIO_ACCESS_KEY=minio-admin \
#   MINIO_SECRET_KEY=minio-password-2024 \
#   MINIO_API_ROUTE=$(oc get route minio-api -n sovereign-rag -o jsonpath='{.spec.host}') \
#     envsubst < manifests/06-data-connection.yaml | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: minio-data-connection
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: "MinIO Data Connection"
    # These annotations are what KServe's S3 storage initializer reads
    # to know it's talking to a non-AWS S3-compatible endpoint.
    serving.kserve.io/s3-endpoint: "${MINIO_API_ROUTE}"
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-region: "us-east-2"
    serving.kserve.io/s3-verifyssl: "1"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
  AWS_DEFAULT_REGION: "us-east-2"
  AWS_S3_ENDPOINT: "https://${MINIO_API_ROUTE}"
  AWS_S3_USE_HTTPS: "1"
  AWS_S3_VERIFY_SSL: "1"
