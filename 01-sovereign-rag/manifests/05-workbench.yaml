# 05-workbench.yaml
# RHOAI Workbench (Jupyter) for running the RAG pipeline notebooks.
# Uses the standard data science image — no custom image needed.
# Sized conservatively; the heavy compute is in the InferenceService, not here.
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: sovereign-rag-workbench
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    notebooks.opendatahub.io/inject-oauth: "true"
spec:
  template:
    spec:
      containers:
        - name: sovereign-rag-workbench
          image: registry.redhat.io/rhoai/odh-workbench-jupyter-datascience-cpu-py312-rhel9@sha256:128879eb003be1d01c721bba289d2fce6adf74695c738247076704fd461a3fc8
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src
      volumes:
        - name: workbench-storage
          persistentVolumeClaim:
            claimName: sovereign-rag-workbench-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sovereign-rag-workbench-pvc
  namespace: sovereign-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
