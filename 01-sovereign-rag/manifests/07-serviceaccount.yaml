# 07-serviceaccount.yaml
# ServiceAccount used by the InferenceService predictor pod.
# Links to the MinIO data connection secret via annotation, which is
# how KServe knows which Secret to pull S3/MinIO credentials from when
# a predictor references this ServiceAccount.
#
# This is a new file — not part of the original manifest set. It was
# missing because the original design assumed native AWS S3, which
# KServe can sometimes resolve without an explicit ServiceAccount link
# in certain IRSA-style setups. Self-hosted MinIO requires this
# explicit secret binding.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-sa
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
secrets:
  - name: minio-data-connection
