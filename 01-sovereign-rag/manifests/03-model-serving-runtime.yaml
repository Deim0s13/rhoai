# 03-model-serving-runtime.yaml
# Registers vLLM as a serving runtime in RHOAI.
#
# UPDATED: switched from quay.io/rh-aiservices-bu/vllm-openai-ubi9:0.6.2
# to registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5 — Red Hat AI Inference
# Server, the supported, versioned, enterprise-grade vLLM distribution.
# The original Quay tag no longer exists in that repo.
#
# FIXED: this ServingRuntime is the single source of truth for all vLLM
# serving arguments — previously split across this file and
# 04-inference-service.yaml's model.args, which KServe merged into a
# duplicated/conflicting argument list.
#
# FIXED: explicitly pass the model path as a positional argument.
# Initial assumption was that KServe auto-injects --model=/mnt/models
# for the model predictor type — confirmed FALSE for this runtime/KServe
# version combination. Without it, vllm serve fell through to trying to
# resolve a default model from HuggingFace Hub, which failed because
# outgoing traffic is disabled in the container (correct behaviour for
# an air-gapped/sovereign deployment — it's just not pointed at our
# local weights without this explicit argument).
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    openshift.io/display-name: "vLLM Runtime (Red Hat AI Inference Server)"
spec:
  multiModel: false
  supportedModelFormats:
    - name: pytorch
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5
      command: ["vllm", "serve"]
      args:
        - "/mnt/models"
        - "--port=8080"
        - "--dtype=bfloat16"
        - "--max-model-len=8192"
        - "--gpu-memory-utilization=0.85"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
