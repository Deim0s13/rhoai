# 03-model-serving-runtime.yaml
# Registers vLLM as a serving runtime in RHOAI.
# This makes it available as an option when creating an InferenceService.
#
# UPDATED: switched from quay.io/rh-aiservices-bu/vllm-openai-ubi9:0.6.2
# to registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5 — Red Hat AI Inference
# Server, the supported, versioned, enterprise-grade vLLM distribution.
# The original Quay tag no longer exists in that repo.
#
# FIXED: removed the positional /mnt/models argument. KServe's model
# predictor type automatically injects --model=/mnt/models into the
# container args at runtime. Our manifest also passing /mnt/models as
# a positional argument caused `vllm serve` to receive both the
# injected --model flag AND a positional path, which the new RHAIIS
# CLI rejects ("unrecognized arguments: /mnt/models"). KServe's
# auto-injection is what actually wires up the storage-initializer's
# output to the serving container, so we let it do that job alone.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: sovereign-rag
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    openshift.io/display-name: "vLLM Runtime (Red Hat AI Inference Server)"
spec:
  multiModel: false
  supportedModelFormats:
    - name: pytorch
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5
      command: ["vllm", "serve"]
      args:
        - "--port=8080"
        - "--dtype=auto"
        - "--max-model-len=4096"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
