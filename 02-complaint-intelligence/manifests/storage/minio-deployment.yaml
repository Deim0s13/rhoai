# Plain Deployment, not the OLM operator: UC01 learning, the operator is not
# reliably available in RHDP catalog environments.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: complaint-intelligence
spec:
  replicas: 1
  strategy:
    type:
      Recreate # RWO PVC and single-drive erasure backend: RollingUpdate
      # starts a second pod against the same volume and can
      # interrupt MinIO's first-time .minio.sys/ init, leaving
      # a half-written system dir it cannot recover from.
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z # UC01-proven tag; VALIDATE currency periodically
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef: { name: minio-credentials }
          ports:
            - containerPort: 9000
            - containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
