# Plain Deployment, not the OLM operator: UC01 learning, the operator is not
# reliably available in RHDP catalog environments.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: complaint-intelligence
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest   # VALIDATE: pin to current digest on day one (UC01: tags go stale)
          args: ["server", "/data", "--console-address", ":9090"]
          envFrom:
            - secretRef: { name: minio-credentials }
          ports:
            - containerPort: 9000
            - containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
