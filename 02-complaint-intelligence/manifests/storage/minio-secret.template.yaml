# Rendered at deploy time via envsubst; never commit a rendered copy.
# Required env: MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: complaint-intelligence
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
