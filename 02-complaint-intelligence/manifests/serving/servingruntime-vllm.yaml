# UC01 learning: the ServingRuntime is the single source of truth for vLLM args.
# Do not duplicate args on the InferenceService; KServe merges them and the
# result is order-dependent surprise.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: complaint-intelligence
  labels:
    opendatahub.io/dashboard: "true"
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      # VALIDATE: confirm current RHAIIS vLLM image tag on day one (UC01: tags go stale)
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:latest
      args:
        - --model=/mnt/models
        - --served-model-name=granite-3-3-8b-instruct
        - --max-model-len=8192
        - --gpu-memory-utilization=0.90
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests: { cpu: "2", memory: 16Gi, nvidia.com/gpu: "1" }
        limits:   { cpu: "6", memory: 24Gi, nvidia.com/gpu: "1" }
