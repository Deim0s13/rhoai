# S3 connection for KServe model download.
# UC01 learnings applied: AWS_S3_ENDPOINT is a BARE hostname (a scheme prefix
# plus the s3-usehttps annotation produced https://https://... and DNS failure).
#
# DELIBERATE DEVIATION from UC01 (flagged for day-one validation): UC01's
# proven config used the external minio-api Route with HTTPS. Here we use the
# in-cluster Service instead, because the bootstrap renders secrets BEFORE
# GitOps creates the Route, and the Service DNS name is deterministic in
# advance (rebuildability). If the storage initializer rejects this, fall back
# to the UC01 Route pattern: render this secret after sync, with
#   MINIO_API_ROUTE=$(oc get route minio-api -n complaint-intelligence -o jsonpath='{.spec.host}')
# and set usehttps/verifyssl to "1".
#
# Rendered via envsubst; never commit a rendered copy.
# Required env: MINIO_ACCESS_KEY, MINIO_SECRET_KEY
apiVersion: v1
kind: Secret
metadata:
  name: model-storage-connection
  namespace: complaint-intelligence
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    opendatahub.io/connection-type: s3
    serving.kserve.io/s3-endpoint: "minio.complaint-intelligence.svc.cluster.local:9000"
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: "us-east-1"
    serving.kserve.io/s3-verifyssl: "0"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
  AWS_S3_ENDPOINT: "minio.complaint-intelligence.svc.cluster.local:9000"
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_S3_USE_HTTPS: "0"
  AWS_S3_VERIFY_SSL: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving-sa
  namespace: complaint-intelligence
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
secrets:
  - name: model-storage-connection
