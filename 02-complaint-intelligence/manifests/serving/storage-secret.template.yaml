# S3 connection for KServe model download from in-cluster MinIO.
# UC01 learning: AWS_S3_ENDPOINT must be a bare hostname (no scheme).
# Rendered via envsubst. Required env: MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: model-storage-connection
  namespace: complaint-intelligence
  annotations:
    serving.kserve.io/s3-endpoint: "minio.complaint-intelligence.svc.cluster.local:9000"
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: "us-east-1"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
  AWS_S3_ENDPOINT: "minio.complaint-intelligence.svc.cluster.local:9000"
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_S3_USE_HTTPS: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving-sa
  namespace: complaint-intelligence
secrets:
  - name: model-storage-connection
