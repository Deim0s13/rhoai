# Rendered via envsubst; never commit a rendered copy.
# Required env: MINIO_ACCESS_KEY, MINIO_SECRET_KEY (UC01 naming convention,
# so the same exported variables serve both use cases)
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: complaint-intelligence
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
  MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
