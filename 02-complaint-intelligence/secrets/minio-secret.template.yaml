# Rendered by scripts/bootstrap.sh via envsubst; never commit a rendered copy.
# Lives OUTSIDE manifests/ deliberately: Argo syncs manifests/ and would apply
# this file verbatim, placeholders and all. See ADR-0005.
# Required env: MINIO_ACCESS_KEY, MINIO_SECRET_KEY
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: complaint-intelligence
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
  MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
