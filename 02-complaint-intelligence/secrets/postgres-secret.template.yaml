# Rendered by scripts/bootstrap.sh via envsubst; never commit a rendered copy.
# Lives outside manifests/ deliberately (ADR-0005).
#
# Secret name and key match the RHOAI 3.4 documented example exactly
# (postgres-secret / password), so the CR reads the same as the docs.
#
# Required env: POSTGRES_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: complaint-intelligence
type: Opaque
stringData:
  password: "${POSTGRES_PASSWORD}"
