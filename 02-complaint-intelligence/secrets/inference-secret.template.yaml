# Connection details Llama Stack uses to reach the vLLM endpoint.
#
# Session finding 2026-07-14: KServe RawDeployment creates a HEADLESS predictor
# service (ClusterIP: None). Port mappings declared on a headless service are
# not applied, because DNS resolves straight to the pod IP with no proxy in
# between. The declared "port=80 target=8080" is therefore a no-op: in-cluster
# clients must target the CONTAINER port 8080, not the service port 80.
# Symptom if this is wrong: Llama Stack exits ~8s after start with
#   ValueError: Failed to connect to vLLM at http://...svc.cluster.local/v1
#
# INFERENCE_MODEL must match --served-model-name in the ServingRuntime. If that
# flag was dropped (V2 fallback), set this to /mnt/models instead.
#
# Rendered by scripts/bootstrap.sh via envsubst; never commit a rendered copy.
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-inference
  namespace: complaint-intelligence
type: Opaque
stringData:
  INFERENCE_MODEL: "granite-3-3-8b-instruct"
  VLLM_URL: "http://granite-3-3-8b-instruct-predictor.complaint-intelligence.svc.cluster.local:8080/v1"
  VLLM_TLS_VERIFY: "false"
  VLLM_API_TOKEN: "fake"
