# S3 connection for KServe model download from in-cluster MinIO.
# UC01 learning: AWS_S3_ENDPOINT must be a BARE hostname. A scheme prefix plus
# the s3-usehttps annotation produces https://https://... and DNS failure.
#
# Validated 2026-07-14: the in-cluster Service endpoint works for the storage
# initializer (the observed failure was NoSuchBucket, i.e. connection fine,
# bucket not yet seeded). No Route fallback needed here. The separate
# minio-api Route exists only for laptop-side seeding.
#
# Rendered by scripts/bootstrap.sh via envsubst; never commit a rendered copy.
# Required env: MINIO_ACCESS_KEY, MINIO_SECRET_KEY
apiVersion: v1
kind: Secret
metadata:
  name: model-storage-connection
  namespace: complaint-intelligence
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
  annotations:
    opendatahub.io/connection-type: s3
    serving.kserve.io/s3-endpoint: "minio.complaint-intelligence.svc.cluster.local:9000"
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: "us-east-1"
    serving.kserve.io/s3-verifyssl: "0"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
  AWS_S3_ENDPOINT: "minio.complaint-intelligence.svc.cluster.local:9000"
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_S3_USE_HTTPS: "0"
  AWS_S3_VERIFY_SSL: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving-sa
  namespace: complaint-intelligence
  labels:
    app.kubernetes.io/part-of: rhoai-presales-lab
secrets:
  - name: model-storage-connection
